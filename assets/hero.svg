<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="heroGlow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#171410"/>
      <stop offset="60%" stop-color="#0D0D0D"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="fadeDown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#D4AF37" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#heroGlow)"/>

  <!-- quiet presence: a single soft ring, mostly off-frame -->
  <circle cx="960" cy="180" r="420" fill="none" stroke="url(#ringFade)" stroke-width="1">
    <animate attributeName="r" values="420;438;420" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- monogram mark -->
  <g transform="translate(600,132)" stroke="#D4AF37" stroke-width="1" fill="none" opacity="0.9">
    <circle r="15" opacity="0.55"/>
    <path d="M -6,7 L 0,-8 L 6,7" stroke-width="1.1"/>
  </g>

  <text x="600" y="200" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#8A8A8A" letter-spacing="5">DAVID OKOCHA</text>

  <text x="600" y="308" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="60" font-weight="300" fill="#F5F5F5" letter-spacing="-1">Building technology that</text>
  <text x="600" y="380" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="60" font-weight="300" fill="#F5F5F5" letter-spacing="-1">changes how Africa learns.</text>

  <text x="600" y="446" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#8A8A8A" letter-spacing="0.4">
    Founder, <tspan fill="#D4AF37">Edgai</tspan> &#8201;&#183;&#8201; Full Stack Engineer, <tspan fill="#D4AF37">Migranium</tspan> &#8201;&#183;&#8201; Lagos, Nigeria
  </text>

  <line x1="600" y1="600" x2="600" y2="644" stroke="url(#fadeDown)" stroke-width="1"/>
</svg>
