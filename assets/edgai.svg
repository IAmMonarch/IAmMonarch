<svg width="1200" height="640" viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edgaiBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <filter id="softGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="url(#edgaiBg)"/>

  <!-- quiet network line-art: nodes that stay connected without a central signal -->
  <g stroke="#D4AF37" stroke-width="1" opacity="0.28">
    <line x1="120" y1="560" x2="290" y2="500"/>
    <line x1="290" y1="500" x2="230" y2="420"/>
    <line x1="290" y1="500" x2="430" y2="540"/>
    <line x1="900" y1="500" x2="1050" y2="450"/>
    <line x1="900" y1="500" x2="1000" y2="580"/>
    <line x1="770" y1="440" x2="900" y2="500"/>
  </g>
  <g fill="#D4AF37">
    <circle cx="120" cy="560" r="2.4" opacity="0.6"/>
    <circle cx="290" cy="500" r="2.8" opacity="0.75"/>
    <circle cx="230" cy="420" r="2" opacity="0.45"/>
    <circle cx="430" cy="540" r="2" opacity="0.45"/>
    <circle cx="770" cy="440" r="2" opacity="0.45"/>
    <circle cx="900" cy="500" r="2.8" opacity="0.75"/>
    <circle cx="1050" cy="450" r="2.2" opacity="0.55"/>
    <circle cx="1000" cy="580" r="2" opacity="0.45"/>
  </g>

  <text x="600" y="130" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#8A8A8A" letter-spacing="5">WHAT I'M BUILDING</text>

  <text x="600" y="268" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="128" font-weight="300" fill="#D4AF37" letter-spacing="-2" filter="url(#softGold)">Edgai</text>

  <text x="600" y="330" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#F5F5F5" letter-spacing="-0.2">
    An offline-first AI tutor for African secondary school students.
  </text>

  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#8A8A8A" letter-spacing="3">
    <text x="480" y="392" text-anchor="middle">WAEC</text>
    <text x="600" y="392" text-anchor="middle">JAMB</text>
    <text x="720" y="392" text-anchor="middle">NECO</text>
  </g>
  <line x1="530" y1="378" x2="530" y2="392" stroke="#D4AF37" stroke-opacity="0.4"/>
  <line x1="660" y1="378" x2="660" y2="392" stroke="#D4AF37" stroke-opacity="0.4"/>

  <text x="600" y="454" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" font-style="italic" fill="#8A8A8A">
    Because education shouldn't depend on a signal.
  </text>
</svg>
